
<div id="erd" style="padding: 8px 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2c2c2a' : '#f1efe8',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  boards ||--o{ columns : "has"
  boards ||--o{ cards : "contains"
  boards ||--o{ board_members : "has"
  boards ||--o{ activity_logs : "tracks"
  columns ||--o{ cards : "contains"
  cards ||--o{ card_checklist_items : "has"
  cards ||--o{ activity_logs : "referenced in"
  boards {
    uuid id PK
    text name
    text room_code
    text room_password_hash
    uuid created_by FK
    bigint revision
    timestamptz created_at
    timestamptz updated_at
  }
  columns {
    uuid id PK
    uuid board_id FK
    text name
    bigint order_index
    uuid created_by FK
    timestamptz created_at
    timestamptz updated_at
  }
  cards {
    uuid id PK
    uuid board_id FK
    uuid column_id FK
    text title
    text description
    jsonb labels
    timestamptz due_date
    timestamptz start_date
    text accent_color
    bigint order_index
    uuid assignee_id FK
    uuid created_by FK
    timestamptz created_at
    timestamptz updated_at
  }
  card_checklist_items {
    uuid id PK
    uuid card_id FK
    text title
    text description
    boolean is_done
    bigint order_index
    timestamptz created_at
    timestamptz updated_at
  }
  board_members {
    bigint id PK
    uuid board_id FK
    uuid user_id FK
    member_role role
    member_status status
    uuid approved_by FK
    timestamptz approved_at
    timestamptz created_at
    timestamptz updated_at
  }
  activity_logs {
    bigint id PK
    uuid board_id FK
    uuid card_id FK
    uuid actor_user_id FK
    action action
    uuid from_column_id FK
    uuid to_column_id FK
    bigint from_order_index
    bigint to_order_index
    jsonb metadata
    timestamptz created_at
  }
  profiles {
    uuid id PK
    text display_name
    timestamptz created_at
    timestamptz updated_at
  }
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
